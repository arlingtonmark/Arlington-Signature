<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arlington Email Signature Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      padding: 30px;
      margin: 0;
    }

    .generator {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
    }

    h2 {
      color: #085235;
      margin-bottom: 5px;
    }

    .subheading {
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .mode-buttons button {
      margin-right: 10px;
      padding: 8px 16px;
      border: 2px solid #085235;
      background: white;
      color: #085235;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
    }

    .mode-buttons button.active {
      background: #085235;
      color: white;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button.generate {
      margin-top: 20px;
      padding: 12px 20px;
      background: #085235;
      color: #ffffff;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      opacity: 0.9;
    }

    .signature-preview {
      margin-top: 40px;
      padding-top: 20px;
    }
  </style>
</head>

<body>

<main class="generator">

  <h2>Arlington Email Signature Generator</h2>
  <div class="subheading">Generate email signature for:</div>

  <div class="mode-buttons">
    <button id="externalBtn" class="active">External Use</button>
    <button id="internalBtn">Internal Use</button>
  </div>

  <label for="firstName">First Name</label>
  <input type="text" id="firstName">

  <label for="lastName">Last Name</label>
  <input type="text" id="lastName">

  <label for="title">Title</label>
  <input type="text" id="title">

  <label for="phone">Phone Number</label>
  <input type="text" id="phone">

  <div id="bannerSelector">
    <label for="banner">Choose Banner</label>
    <select id="banner">
      <option value="https://image-tc.galaxy.tf/wipng-695gdep2jxa77cq9vuu6pbnfz/file.png?width=800">Arlington Sunset</option>
      <option value="https://image-tc.galaxy.tf/wipng-2fd6a80w91xgf91rfd4hg1l4z/file.png?width=800">Aerial Black & White</option>
      <option value="https://image-tc.galaxy.tf/wipng-1o00lm5j7m7ycyj65vhwe4wpr/file.png?width=800">Arlington Black & White</option>
    </select>
  </div>

  <button class="generate" id="generateBtn">Generate Signature</button>

  <section class="signature-preview">

    <div id="signature">

      <table cellpadding="0" cellspacing="0" style="width:400px;font-family:Arial,sans-serif;font-size:9pt;border-collapse:collapse;">

        <tr>
          <td colspan="2" style="font-size:15pt;font-weight:bold;color:#085235;">
            <span id="sigName">Your Name</span><br>
            <span id="sigTitle" style="font-size:10pt;color:#000;display:none;"></span>
          </td>
        </tr>

        <!-- Space under title -->
        <tr>
          <td colspan="2" height="8"></td>
        </tr>

        <tr>
          <td colspan="2" style="padding-top:10px;border-top:1px solid #085235;height:8px;"></td>
        </tr>

        <tr>
          <td colspan="2" style="font-size:10pt;font-weight:bold;color:#085235;">
            The Arlington Resort Hotel &amp; Spa
          </td>
        </tr>

        <tr>
          <td colspan="2" style="font-size:10pt;color:#000;">
            239 Central Ave, Hot Springs, AR 71901
          </td>
        </tr>

        <tr>
          <td colspan="2" style="font-size:10pt;color:#000;">
            t: <span id="sigPhone"></span>
          </td>
        </tr>

        <tr><td colspan="2" height="10"></td></tr>

        <!-- External-only row -->
        <tr id="externalRow">
          <td style="font-size:10pt;">
            <a href="https://www.arlingtonhotel.com" style="color:#000;text-decoration:none;">
              www.arlingtonhotel.com
            </a>
          </td>

          <td style="text-align:right;">
            <a href="https://www.facebook.com/TheArlington/" target="_blank">
              <img src="https://image-tc.galaxy.tf/wipng-1cjkj56bhszp4di3grdmqlb3i/file.png?width=260" width="18">
            </a>
            <a href="https://www.instagram.com/thearlingtonresort/" target="_blank">
              <img src="https://image-tc.galaxy.tf/wipng-2zuzbyyt9yy0haqs9nw349mj4/file.png?width=260" width="18">
            </a>
          </td>
        </tr>

        <tr id="bannerSpacer"><td colspan="2" height="15"></td></tr>

        <tr id="bannerRow">
          <td colspan="2">
            <img id="sigBanner" src="" width="400" style="display:block;border:0;max-width:400px;">
          </td>
        </tr>

      </table>

    </div>

    <button class="generate" id="copyBtn">Copy Signature</button>

  </section>

</main>

<script>
let mode = "external";

document.getElementById("externalBtn").onclick = () => setMode("external");
document.getElementById("internalBtn").onclick = () => setMode("internal");

function setMode(selected) {
  mode = selected;

  document.getElementById("externalBtn").classList.toggle("active", selected === "external");
  document.getElementById("internalBtn").classList.toggle("active", selected === "internal");

  document.getElementById("bannerSelector").style.display = selected === "external" ? "block" : "none";
  document.getElementById("externalRow").style.display = selected === "external" ? "" : "none";
  document.getElementById("bannerRow").style.display = selected === "external" ? "" : "none";
  document.getElementById("bannerSpacer").style.display = selected === "external" ? "" : "none";
}

document.getElementById("generateBtn").addEventListener("click", () => {
  const first = document.getElementById("firstName").value.trim();
  const last = document.getElementById("lastName").value.trim();
  const fullName = (first + " " + last).trim() || "Your Name";

  document.getElementById("sigName").textContent = fullName;

  const title = document.getElementById("title").value.trim();
  const titleEl = document.getElementById("sigTitle");

  if (title) {
    titleEl.style.display = "inline";
    titleEl.textContent = title;
  } else {
    titleEl.style.display = "none";
  }

  document.getElementById("sigPhone").textContent = document.getElementById("phone").value;

  if (mode === "external") {
    document.getElementById("sigBanner").src = document.getElementById("banner").value;
  }
});

document.getElementById("copyBtn").addEventListener("click", () => {
  const range = document.createRange();
  range.selectNode(document.getElementById("signature"));
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);
  document.execCommand("copy");
  selection.removeAllRanges();
  alert("Signature copied! Paste directly into Outlook.");
});
</script>

</body>
</html>
